services:
  backend:
    build:
      context: ./backend
    container_name: oration-spin-hub-api
    restart: unless-stopped
    environment:
      PORT: 4000
      DATA_DIR: /app/data
      JWT_SECRET: replace-with-a-long-random-secret
      JWT_EXPIRES_IN: 8h
      CORS_ORIGIN: http://localhost:5173,https://orationarena.urlfactory.website
      SMTP_HOST:
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER:
      SMTP_PASS:
      EMAIL_FROM: ORATION ARENA <no-reply@example.com>
      WEBEX_BOT_TOKEN:
      WEBEX_ROOM_ID:
    ports:
      - "4000:4000"
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: oration-spin-hub-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: https://orationarena.urlfactory.website/api
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0

volumes:
  backend_data:
